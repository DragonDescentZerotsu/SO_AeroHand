name: Piper_aerohand_pipette_table_grasp
base_model: models/piper_aero_hand/Piper_aerohand.xml
output_model: models/piper_aero_hand/scenes/Piper_aerohand_pipette_table.xml

# Match the existing SO101 table scene: with Piper at its teleop home qpos,
# place the Aero wrist near the same table-relative pose as the SO101 wrist.
base_pose:
  body_path: [base_link]
  pos: [-0.37785, 0.0, 0.69360]
  quat: [1.0, 0.0, 0.0, 0.0]

viewer:
  statistic:
    center: [0.10, 0.0, 0.90]
    extent: 0.80
    meansize: 0.01
  global:
    azimuth: 160
    elevation: -20

static_models:
  - id: table_0
    model_name: table_model
    source: models/so101_aero_hand/objects/vention_table_top.xml
    body: vention_table_top
    prefix: table_0/
    init:
      pos: [0.0, 0.0, 0.0]
      quat: [1.0, 0.0, 0.0, 0.0]

objects:
  - id: pipette_0
    model_name: pipette_model
    source: external/AutoBio/autobio/model/object/pipette.gen.xml
    body: pipette
    prefix: pipette_0/
    freejoint: true
    init:
      # Same settled wrapper pose and orientation as the SO101 table scene.
      # AutoBio's visible pipette has an internal offset from this wrapper.
      pos: [-0.03342, 0.00169, 0.79854]
      quat: [0.72864, -0.00355, -0.68487, -0.00410]
    randomize:
      pos:
        x: [-0.06, -0.01]
        y: [-0.03, 0.03]
        z: [0.790, 0.820]
      yaw: [-0.8, 0.8]

robot:
  randomize:
    arm_qpos:
      joint1: [-0.4, 0.4]
      joint2: [1.1, 1.9]
      joint3: [-1.8, -0.8]
      joint4: [-0.5, 0.5]
      joint5: [-0.5, 0.5]
      joint6: [-1.0, 1.0]

task:
  type: table_grasp_object
  target_objects: [pipette_0]
  support: table_0
  success:
    lift_height: 0.05
    hold_steps: 20
